<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Сидоров Сергей Петрович</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#1a4d2e 0%,#2d5016 50%,#4a7c2e 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
    overflow:hidden;
}
body::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="50" font-size="50" opacity="0.05">🌿</text></svg>') repeat;
    background-size:100px 100px;
    pointer-events:none;
}
.card{
    background:rgba(255,255,255,0.95);
    border-radius:24px;
    padding:40px 32px;
    max-width:400px;
    width:100%;
    text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    position:relative;
    z-index:1;
    border:3px solid #2d5016;
}
.leaf-top,.leaf-bottom{
    position:absolute;
    font-size:48px;
    opacity:0.3;
}
.leaf-top{top:10px;left:20px;transform:rotate(-30deg)}
.leaf-bottom{bottom:10px;right:20px;transform:rotate(150deg)}
.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:0 auto 20px;
    object-fit:cover;
    border:4px solid #4a7c2e;
    box-shadow:0 4px 16px rgba(45,80,22,0.3);
    background:linear-gradient(135deg,#2d5016,#4a7c2e);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:48px;
    font-weight:bold;
}
h2{
    font-size:24px;
    color:#1a4d2e;
    margin-bottom:8px;
    font-weight:600;
}
.id{
    color:#4a7c2e;
    font-size:14px;
    font-weight:600;
    margin-bottom:24px;
    padding:6px 16px;
    background:rgba(74,124,46,0.1);
    border-radius:20px;
    display:inline-block;
}
.info{
    text-align:left;
    margin-top:20px;
}
.info-item{
    padding:16px 0;
    border-bottom:2px solid rgba(74,124,46,0.2);
}
.info-item:last-child{
    border-bottom:none;
}
.label{
    color:#654321;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
    font-weight:600;
    margin-bottom:6px;
    display:flex;
    align-items:center;
    gap:6px;
}
.label::before{
    content:'🌿';
    font-size:14px;
}
.value{
    color:#1a4d2e;
    font-size:17px;
    font-weight:500;
    padding-left:20px;
}
</style>
</head>
<body>
<div class="card">
<div class="leaf-top">🍃</div>
<div class="leaf-bottom">🍃</div>
<div class="avatar">С</div>
<h2>Сидоров Сергей Петрович</h2>
<div class="id">ID: 82938</div>
<div class="info">
<div class="info-item">
<div class="label">Команда</div>
<div class="value">Команда Альфа</div>
</div>
<div class="info-item">
<div class="label">Участие</div>
<div class="value">Марафон кода</div>
</div>
</div>
</div>
</body>
</html>
